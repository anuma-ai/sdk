name: E2E Tools

permissions:
  contents: read

on:
  merge_group:
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e-tools:
    if: github.event_name == 'merge_group' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      PORTAL_API_KEY: ${{ secrets.PORTAL_API_KEY }}
      ANUMA_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
      GOOGLE_SERVICE_ACCOUNT_KEY: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY }}
      GOOGLE_SHARED_DRIVE_ID: ${{ secrets.GOOGLE_SHARED_DRIVE_ID }}

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: Run e2e tool tests
        run: pnpm e2e:tools

  e2e-tools-status:
    if: always()
    needs: [e2e-tools]
    runs-on: ubuntu-latest
    steps:
      - name: Check e2e results
        run: |
          if [[ "${{ needs.e2e-tools.result }}" == "failure" ]]; then
            echo "E2E tool tests failed"
            exit 1
          fi
          echo "E2E tool tests passed (or skipped)"
