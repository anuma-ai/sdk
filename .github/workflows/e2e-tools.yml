name: E2E Tools

permissions:
  contents: read

on:
  merge_group:
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      model:
        description: "Model to test (leave empty for default kimi-k2p5)"
        required: false
        type: choice
        default: ""
        options:
          - ""
          - "fireworks/accounts/fireworks/models/glm-5"
          - "minimax/MiniMax-M2.7"
          - "anthropic/claude-sonnet-4-6"
          - "gemini/gemini-3.1-pro-preview"
          - "openai/gpt-5.4"
          - "all"
      test_filter:
        description: "Vitest file filter (e.g. 'weather' to match weather.ts — leave empty for all tests)"
        required: false
        type: string
        default: ""

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.event.inputs.model || 'default' }}
  cancel-in-progress: true

jobs:
  e2e-tools:
    if: github.event_name == 'merge_group' || (github.event_name == 'workflow_dispatch' && github.event.inputs.model != 'all')
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      PORTAL_API_KEY: ${{ secrets.PORTAL_API_KEY }}
      ANUMA_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
      GOOGLE_SERVICE_ACCOUNT_KEY: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY }}
      GOOGLE_SHARED_DRIVE_ID: ${{ secrets.GOOGLE_SHARED_DRIVE_ID }}
      E2E_MODEL: ${{ github.event.inputs.model || '' }}

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: Run e2e tool tests
        env:
          TEST_FILTER: ${{ github.event.inputs.test_filter || '' }}
        run: pnpm e2e:tools "$TEST_FILTER"

  e2e-tools-compat:
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.model == 'all'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        model:
          - "fireworks/accounts/fireworks/models/glm-5"
          - "minimax/MiniMax-M2.7"
          - "anthropic/claude-sonnet-4-6"
          - "gemini/gemini-3.1-pro-preview"
          - "openai/gpt-5.4"
    env:
      PORTAL_API_KEY: ${{ secrets.PORTAL_API_KEY }}
      ANUMA_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
      GOOGLE_SERVICE_ACCOUNT_KEY: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY }}
      GOOGLE_SHARED_DRIVE_ID: ${{ secrets.GOOGLE_SHARED_DRIVE_ID }}
      E2E_MODEL: ${{ matrix.model }}

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: Run e2e tool tests (${{ matrix.model }})
        env:
          TEST_FILTER: ${{ github.event.inputs.test_filter || '' }}
        run: pnpm e2e:tools "$TEST_FILTER"

  e2e-tools-status:
    if: always()
    needs: [e2e-tools, e2e-tools-compat]
    runs-on: ubuntu-latest
    steps:
      - name: Check e2e results
        run: |
          e2e="${{ needs.e2e-tools.result }}"
          compat="${{ needs.e2e-tools-compat.result }}"
          echo "e2e-tools: $e2e, e2e-tools-compat: $compat"
          if [[ "$e2e" != "success" && "$e2e" != "skipped" ]] || \
             [[ "$compat" != "success" && "$compat" != "skipped" ]]; then
            echo "E2E tool tests did not pass"
            exit 1
          fi
          echo "E2E tool tests passed"
