name: Integration Check

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  integration:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        ref:
          - pr
          - main
    env:
      NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
      NEXT_PUBLIC_PRIVY_APP_ID: ${{ secrets.NEXT_PUBLIC_PRIVY_APP_ID }}
      NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${{ secrets.NEXT_PUBLIC_GOOGLE_CLIENT_ID }}
      TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
      TEST_USER_OTP: ${{ secrets.TEST_USER_OTP }}
      NEXT_PUBLIC_DROPBOX_APP_KEY: ${{ secrets.NEXT_PUBLIC_DROPBOX_APP_KEY }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ matrix.ref == 'main' && 'main' || '' }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install

      - name: Build SDK
        run: pnpm build

      - name: Pack SDK
        run: pnpm pack --pack-destination /tmp/sdk-pack

      - name: Clone starter-next
        env:
          GH_TOKEN: ${{ secrets.EXAMPLES_REPO_TOKEN }}
        run: gh repo clone anuma-ai/starter-next /tmp/starter-next -- --depth 1

      - name: Install SDK from tarball
        working-directory: /tmp/starter-next
        run: |
          corepack enable
          pnpm install
          SDK_TARBALL=$(ls /tmp/sdk-pack/*.tgz)
          pnpm add "$SDK_TARBALL"

      - name: Build starter-next
        id: build
        working-directory: /tmp/starter-next
        continue-on-error: true
        run: pnpm build

      - name: Install Playwright browsers
        if: steps.build.outcome == 'success'
        working-directory: /tmp/starter-next
        run: pnpm exec playwright install --with-deps chromium

      - name: Run light e2e tests
        id: e2e
        if: steps.build.outcome == 'success'
        working-directory: /tmp/starter-next
        continue-on-error: true
        run: pnpm test:e2e:light

      - name: Write outcome
        run: |
          mkdir -p /tmp/outcomes
          echo "${{ steps.build.outcome }}" > /tmp/outcomes/${{ matrix.ref }}-build
          echo "${{ steps.e2e.outcome }}" > /tmp/outcomes/${{ matrix.ref }}-e2e

      - name: Upload outcome
        uses: actions/upload-artifact@v4
        with:
          name: outcome-${{ matrix.ref }}
          path: /tmp/outcomes/

  report:
    needs: integration
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Download outcomes
        uses: actions/download-artifact@v4
        with:
          path: /tmp/outcomes
          merge-multiple: true

      - name: Comment on PR
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PR_BUILD=$(cat /tmp/outcomes/pr-build)
          PR_E2E=$(cat /tmp/outcomes/pr-e2e)
          MAIN_BUILD=$(cat /tmp/outcomes/main-build)
          MAIN_E2E=$(cat /tmp/outcomes/main-e2e)

          # Build the status table
          row() {
            local label=$1 main_val=$2 pr_val=$3
            local main_icon="✅" pr_icon="✅"
            [ "$main_val" != "success" ] && main_icon="❌"
            [ "$pr_val" != "success" ] && pr_icon="❌"
            echo "| $label | $main_icon | $pr_icon |"
          }

          TABLE="| | main | PR |
          |---|---|---|
          $(row "Build" "$MAIN_BUILD" "$PR_BUILD")
          $(row "e2e" "$MAIN_E2E" "$PR_E2E")"

          if [ "$PR_BUILD" == "success" ] && [ "$PR_E2E" == "success" ]; then
            BODY="<!-- integration-check -->
          ### Integration Check ✅

          $TABLE"
          elif [ "$PR_BUILD" == "$MAIN_BUILD" ] && [ "$PR_E2E" == "$MAIN_E2E" ]; then
            BODY="<!-- integration-check -->
          ### Integration Check ✅ (baseline matches)

          Failures also occur on \`main\` — not caused by this PR.

          $TABLE"
          elif [ "$PR_BUILD" != "success" ] && [ "$MAIN_BUILD" == "success" ]; then
            BODY="<!-- integration-check -->
          ### Integration Check ❌

          **starter-next** fails to build against this PR but passes on \`main\`. This PR introduces a breaking change.

          $TABLE"
          elif [ "$PR_BUILD" == "success" ] && [ "$PR_E2E" != "success" ] && [ "$MAIN_E2E" == "success" ]; then
            BODY="<!-- integration-check -->
          ### Integration Check ⚠️

          **starter-next** builds but e2e tests fail against this PR while passing on \`main\`.

          $TABLE"
          else
            BODY="<!-- integration-check -->
          ### Integration Check ⚠️

          Results differ between \`main\` and this PR — review the table below.

          $TABLE"
          fi

          echo "$BODY" > /tmp/integration-comment.md

          COMMENT_ID=$(gh api "repos/{owner}/{repo}/issues/${{ github.event.pull_request.number }}/comments" \
            --jq '.[] | select(.body | startswith("<!-- integration-check -->")) | .id' | head -1)

          if [ -n "$COMMENT_ID" ]; then
            gh api "repos/{owner}/{repo}/issues/comments/$COMMENT_ID" -X PATCH -F body=@/tmp/integration-comment.md
          else
            gh pr comment ${{ github.event.pull_request.number }} --body-file /tmp/integration-comment.md
          fi

          # Only label if PR is strictly worse than main
          if [ "$PR_BUILD" != "success" ] && [ "$MAIN_BUILD" == "success" ]; then
            gh label create "breaks-starter-build" --description "PR breaks starter-next build" --color "d93f0b" 2>/dev/null || true
            gh pr edit ${{ github.event.pull_request.number }} --add-label "breaks-starter-build" || true
          else
            gh pr edit ${{ github.event.pull_request.number }} --remove-label "breaks-starter-build" 2>/dev/null || true
          fi

          if [ "$PR_E2E" != "success" ] && [ "$PR_E2E" != "" ] && [ "$MAIN_E2E" == "success" ]; then
            gh label create "breaks-starter-e2e" --description "PR breaks starter-next e2e tests" --color "d93f0b" 2>/dev/null || true
            gh pr edit ${{ github.event.pull_request.number }} --add-label "breaks-starter-e2e" || true
          else
            gh pr edit ${{ github.event.pull_request.number }} --remove-label "breaks-starter-e2e" 2>/dev/null || true
          fi
