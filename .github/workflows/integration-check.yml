name: Integration Check

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  integration:
    runs-on: ubuntu-24.04
    env:
      NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
      NEXT_PUBLIC_PRIVY_APP_ID: ${{ secrets.NEXT_PUBLIC_PRIVY_APP_ID }}
      NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${{ secrets.NEXT_PUBLIC_GOOGLE_CLIENT_ID }}
      TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
      TEST_USER_OTP: ${{ secrets.TEST_USER_OTP }}
      NEXT_PUBLIC_DROPBOX_APP_KEY: ${{ secrets.NEXT_PUBLIC_DROPBOX_APP_KEY }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install

      - name: Build SDK
        run: pnpm build

      - name: Pack SDK
        run: pnpm pack --pack-destination /tmp/sdk-pack

      - name: Clone ai-examples
        env:
          GH_TOKEN: ${{ secrets.EXAMPLES_REPO_TOKEN }}
        run: gh repo clone zeta-chain/ai-examples /tmp/ai-examples -- --depth 1

      - name: Install SDK from tarball
        working-directory: /tmp/ai-examples
        run: |
          corepack enable
          pnpm install
          SDK_TARBALL=$(ls /tmp/sdk-pack/*.tgz)
          pnpm add "$SDK_TARBALL"

      - name: Build ai-examples
        id: build
        working-directory: /tmp/ai-examples
        continue-on-error: true
        run: pnpm build

      - name: Install Playwright browsers
        if: steps.build.outcome == 'success'
        working-directory: /tmp/ai-examples
        run: pnpm exec playwright install --with-deps chromium

      - name: Run light e2e tests
        id: e2e
        if: steps.build.outcome == 'success'
        working-directory: /tmp/ai-examples
        continue-on-error: true
        run: pnpm test:e2e:light

      - name: Comment on PR
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          BUILD="${{ steps.build.outcome }}"
          E2E="${{ steps.e2e.outcome }}"

          if [ "$BUILD" == "success" ] && [ "$E2E" == "success" ]; then
            BODY="<!-- integration-check -->
          ### Integration Check ✅

          **ai-examples** builds and passes light e2e tests against this PR's version of the SDK."
          elif [ "$BUILD" == "success" ]; then
            BODY="<!-- integration-check -->
          ### Integration Check ⚠️

          **ai-examples** builds successfully but light e2e tests failed against this PR's version of the SDK."
          else
            BODY="<!-- integration-check -->
          ### Integration Check ❌

          **ai-examples** failed to build against this PR's version of the SDK. If this PR introduces a breaking change, the example app may need to be updated."
          fi

          echo "$BODY" > /tmp/integration-comment.md

          COMMENT_ID=$(gh api "repos/{owner}/{repo}/issues/${{ github.event.pull_request.number }}/comments" \
            --jq '.[] | select(.body | startswith("<!-- integration-check -->")) | .id' | head -1)

          if [ -n "$COMMENT_ID" ]; then
            gh api "repos/{owner}/{repo}/issues/comments/$COMMENT_ID" -X PATCH -F body=@/tmp/integration-comment.md
          else
            gh pr comment ${{ github.event.pull_request.number }} --body-file /tmp/integration-comment.md
          fi

          if [ "$BUILD" == "success" ]; then
            gh pr edit ${{ github.event.pull_request.number }} --remove-label "breaks-starter-build" 2>/dev/null || true
          else
            gh label create "breaks-starter-build" --description "PR breaks the starter app build" --color "d93f0b" 2>/dev/null || true
            gh pr edit ${{ github.event.pull_request.number }} --add-label "breaks-starter-build" || true
          fi

          if [ "$E2E" == "success" ] || [ "$E2E" == "" ]; then
            gh pr edit ${{ github.event.pull_request.number }} --remove-label "breaks-starter-e2e" 2>/dev/null || true
          else
            gh label create "breaks-starter-e2e" --description "PR breaks the starter app e2e tests" --color "d93f0b" 2>/dev/null || true
            gh pr edit ${{ github.event.pull_request.number }} --add-label "breaks-starter-e2e" || true
          fi
