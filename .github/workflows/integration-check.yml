name: Integration Check

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  integration:
    if: github.actor != 'dependabot[bot]'
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        ref: [pr, main]
        repo: [starter-next, starter-mini, starter-telegram, dashboard, text]
        include:
          - repo: starter-next
            e2e: true
          - repo: starter-mini
            e2e: false
          - repo: starter-telegram
            e2e: false
          - repo: dashboard
            e2e: false
          - repo: text
            e2e: false
    env:
      NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
      NEXT_PUBLIC_PRIVY_APP_ID: ${{ secrets.NEXT_PUBLIC_PRIVY_APP_ID }}
      NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${{ secrets.NEXT_PUBLIC_GOOGLE_CLIENT_ID }}
      TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
      TEST_USER_OTP: ${{ secrets.TEST_USER_OTP }}
      NEXT_PUBLIC_DROPBOX_APP_KEY: ${{ secrets.NEXT_PUBLIC_DROPBOX_APP_KEY }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ matrix.ref == 'main' && 'main' || '' }}

      - name: Ensure packageManager field
        run: |
          if ! grep -q '"packageManager"' package.json; then
            node -e "
              const fs = require('fs');
              const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
              pkg.packageManager = 'pnpm@10.23.0';
              fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
            "
          fi

      - uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: Build SDK
        run: pnpm build

      - name: Pack SDK
        run: pnpm pack --pack-destination /tmp/sdk-pack

      - name: Clone ${{ matrix.repo }}
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: gh repo clone anuma-ai/${{ matrix.repo }} /tmp/${{ matrix.repo }} -- --depth 1

      - name: Install SDK from tarball
        working-directory: /tmp/${{ matrix.repo }}
        run: |
          pnpm install
          SDK_TARBALL=$(ls /tmp/sdk-pack/*.tgz)
          pnpm add "$SDK_TARBALL"

      - name: Build ${{ matrix.repo }}
        id: build
        working-directory: /tmp/${{ matrix.repo }}
        continue-on-error: true
        run: pnpm build

      - name: Install Playwright browsers
        if: matrix.e2e && steps.build.outcome == 'success'
        working-directory: /tmp/${{ matrix.repo }}
        run: pnpm exec playwright install --with-deps chromium

      - name: Run light e2e tests
        id: e2e
        if: matrix.e2e && steps.build.outcome == 'success'
        working-directory: /tmp/${{ matrix.repo }}
        continue-on-error: true
        run: pnpm test:e2e:light

      - name: Write outcome
        run: |
          mkdir -p /tmp/outcomes
          echo "${{ steps.build.outcome }}" > /tmp/outcomes/${{ matrix.repo }}-${{ matrix.ref }}-build
          if [ "${{ matrix.e2e }}" == "true" ]; then
            echo "${{ steps.e2e.outcome }}" > /tmp/outcomes/${{ matrix.repo }}-${{ matrix.ref }}-e2e
          fi

      - name: Upload outcome
        uses: actions/upload-artifact@v4
        with:
          name: outcome-${{ matrix.repo }}-${{ matrix.ref }}
          path: /tmp/outcomes/

  report:
    needs: integration
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Download outcomes
        uses: actions/download-artifact@v4
        with:
          path: /tmp/outcomes
          merge-multiple: true

      - name: Comment on PR
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          REPOS="starter-next starter-mini starter-telegram dashboard text"
          E2E_REPOS="starter-next"

          icon() { [ "$1" == "success" ] && echo "✅" || echo "❌"; }

          has_e2e() {
            for r in $E2E_REPOS; do [ "$r" == "$1" ] && return 0; done
            return 1
          }

          # Build the status table
          TABLE="| | main | PR |
          |---|---|---|"

          ALL_PR_OK=true
          ANY_REGRESSION=false
          BROKEN_REPOS=""

          for REPO in $REPOS; do
            MAIN_BUILD=$(cat /tmp/outcomes/${REPO}-main-build 2>/dev/null || echo "skipped")
            PR_BUILD=$(cat /tmp/outcomes/${REPO}-pr-build 2>/dev/null || echo "skipped")
            TABLE="$TABLE
          | ${REPO} build | $(icon "$MAIN_BUILD") | $(icon "$PR_BUILD") |"

            [ "$PR_BUILD" != "success" ] && ALL_PR_OK=false
            if [ "$PR_BUILD" != "success" ] && [ "$MAIN_BUILD" == "success" ]; then
              ANY_REGRESSION=true
              BROKEN_REPOS="$BROKEN_REPOS $REPO"
            fi

            if has_e2e "$REPO"; then
              MAIN_E2E=$(cat /tmp/outcomes/${REPO}-main-e2e 2>/dev/null || echo "skipped")
              PR_E2E=$(cat /tmp/outcomes/${REPO}-pr-e2e 2>/dev/null || echo "skipped")
              TABLE="$TABLE
          | ${REPO} e2e | $(icon "$MAIN_E2E") | $(icon "$PR_E2E") |"

              [ "$PR_E2E" != "success" ] && ALL_PR_OK=false
              if [ "$PR_E2E" != "success" ] && [ "$PR_E2E" != "skipped" ] && [ "$MAIN_E2E" == "success" ]; then
                ANY_REGRESSION=true
              fi
            fi
          done

          if [ "$ALL_PR_OK" == "true" ]; then
            BODY="<!-- integration-check -->
          ### Integration Check ✅

          $TABLE"
          elif [ "$ANY_REGRESSION" == "true" ]; then
            BODY="<!-- integration-check -->
          ### Integration Check ❌

          This PR introduces regressions in:$(echo "$BROKEN_REPOS" | tr ' ' '\n' | sed '/^$/d' | sed 's/^/ **/' | sed 's/$/**/').

          $TABLE"
          else
            BODY="<!-- integration-check -->
          ### Integration Check ✅ (baseline matches)

          Failures also occur on \`main\` — not caused by this PR.

          $TABLE"
          fi

          echo "$BODY" > /tmp/integration-comment.md

          COMMENT_ID=$(gh api "repos/{owner}/{repo}/issues/${{ github.event.pull_request.number }}/comments" \
            --jq '.[] | select(.body | startswith("<!-- integration-check -->")) | .id' | head -1)

          if [ -n "$COMMENT_ID" ]; then
            gh api "repos/{owner}/{repo}/issues/comments/$COMMENT_ID" -X PATCH -F body=@/tmp/integration-comment.md
          else
            gh pr comment ${{ github.event.pull_request.number }} --body-file /tmp/integration-comment.md
          fi

          # Label management
          if [ "$ANY_REGRESSION" == "true" ]; then
            gh label create "breaks-integration" --description "PR breaks downstream repo build or tests" --color "d93f0b" 2>/dev/null || true
            gh pr edit ${{ github.event.pull_request.number }} --add-label "breaks-integration" || true
          else
            gh pr edit ${{ github.event.pull_request.number }} --remove-label "breaks-integration" 2>/dev/null || true
          fi
