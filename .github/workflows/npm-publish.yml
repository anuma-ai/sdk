name: Publish to NPM

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Enable Corepack
        run: corepack enable

      - name: Install Dependencies
        run: pnpm install

      - name: Generate API Client
        run: pnpm run generate

      - name: Build SDK
        run: pnpm run build

      - name: Compute version
        id: version
        run: echo "value=1.0.0-next.$(date +%Y%m%d%H%M%S)" >> "$GITHUB_OUTPUT"

      - name: Set SDK version
        run: npm version ${{ steps.version.outputs.value }} --no-git-tag-version

      - name: Set agent versions
        run: |
          pnpm --filter "./packages/agents/*" exec \
            npm version ${{ steps.version.outputs.value }} --no-git-tag-version --allow-same-version

      - name: Publish SDK
        run: npm publish --access public --tag next
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Build agents
        run: pnpm --filter "./packages/agents/*" run build

      - name: Publish agents
        run: pnpm --filter "./packages/agents/*" publish --access public --tag next --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
