name: LongMemEval Benchmark

on:
  # Manual trigger only - this is an expensive benchmark
  workflow_dispatch:
    inputs:
      variant:
        description: "Dataset variant (s=small ~50 sessions, m=medium ~500 sessions)"
        required: true
        default: "s"
        type: choice
        options:
          - s
          - m
      max_questions:
        description: "Maximum questions to evaluate (leave empty for all)"
        required: false
        default: ""
      skip_unsupported:
        description: "Skip unsupported question types (temporal-reasoning, knowledge-update)"
        required: false
        default: true
        type: boolean

jobs:
  longmemeval:
    name: LongMemEval Benchmark
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Enable Corepack
        run: corepack enable

      - name: Install Dependencies
        run: pnpm install

      - name: Cache LongMemEval Dataset
        uses: actions/cache@v4
        with:
          path: ~/.cache/longmemeval
          key: longmemeval-dataset-v1

      # Preload the dataset (will use cache if available)
      - name: Preload Dataset
        run: pnpm eval:longmemeval:preload

      - name: Run LongMemEval Benchmark
        env:
          PORTAL_API_KEY: ${{ secrets.PORTAL_API_KEY }}
        run: |
          ARGS="--variant ${{ github.event.inputs.variant }}"
          if [ -n "${{ github.event.inputs.max_questions }}" ]; then
            ARGS="$ARGS --max ${{ github.event.inputs.max_questions }}"
          fi
          if [ "${{ github.event.inputs.skip_unsupported }}" = "true" ]; then
            ARGS="$ARGS --skip-unsupported"
          fi
          ARGS="$ARGS --output results.json"
          pnpm eval:longmemeval $ARGS

      - name: Upload Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: longmemeval-results-${{ github.event.inputs.variant }}
          path: results.json
          retention-days: 30
